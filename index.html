<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complexity Classes — Set Diagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

  <!-- PDF export libraries (loaded async — only used on demand) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/svg2pdf.js/2.2.3/svg2pdf.umd.min.js" defer></script>

  <!-- Marked.js — Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX — LaTeX renderer -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/diagram.css">
  <link rel="stylesheet" href="css/detail-view.css">

</head>
<body class="sidebar-open">

  <!-- Toggle button lives OUTSIDE the sidebar so pointer-events are never blocked -->
  <button id="btn-toggle" aria-label="Collapse sidebar" title="Collapse sidebar"></button>

  <aside id="sidebar" aria-label="Complexity class selector">
    <div class="sidebar-inner">
      <!-- ── CLASS VIEW ── -->
      <div id="sidebar-class-view">
        <header id="sidebar-header">
          <div class="title">Complexity Classes</div>
          <div class="header-btns">
            <button id="btn-theme" class="hdr-btn" aria-label="Toggle theme" title="Switch theme">
              <!-- icon set by JS -->
            </button>
          </div>
        </header>
        <div id="class-list" role="group"></div>
        <footer id="sidebar-footer">
          <button id="btn-reset">Reset selection</button>
        </footer>
      </div>
      <!-- ── DETAIL VIEW ── -->
      <div id="sidebar-detail-view">
        <header id="detail-header">
          <div class="title" id="detail-class-title"></div>
          <div class="header-btns">
            <button id="btn-theme-detail" class="hdr-btn" aria-label="Toggle theme" title="Switch theme">
              <!-- icon set by JS -->
            </button>
          </div>
        </header>
        <div id="detail-nav-list"></div>
        <footer id="detail-footer">
          <button id="btn-back">← Back to diagram</button>
        </footer>
      </div>
    </div>
  </aside>

  <main id="main">
    <div id="diagram-wrapper">
      <div id="empty-state">
        <div class="empty-sym">∅</div>
        <div class="empty-msg">Select complexity classes from the panel</div>
      </div>
      <svg id="diagram-svg" viewBox="0 0 800 500"
           preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="Complexity class set diagram">
        <defs id="svg-defs"></defs>
        <g id="diagram-root"></g>
      </svg>
    </div>
    <!-- ── CONTENT PANEL ── -->
    <div id="content-panel">
      <div id="content-title"></div>
      <div id="content-text"></div>
    </div>
  </main>

  <div id="zoom-controls">
    <button id="btn-download" class="dl-disabled" title="Download diagram as PDF" aria-label="Download diagram as PDF">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="10.5"/>
        <polyline points="4.5 7 8 10.5 11.5 7"/>
        <line x1="2.5" y1="14" x2="13.5" y2="14"/>
      </svg>
    </button>
    <button id="btn-zoom-in"  title="Zoom in">+</button>
    <button id="btn-zoom-out" title="Zoom out">−</button>
  </div>

  <!-- Mobile bottom bar: visible only on small screens via CSS -->
  <div id="mobile-bar" style="display:none">
    <button id="btn-mobile-reset" aria-label="Reset selection">Reset selection</button>
    <button id="btn-mobile-toggle" aria-label="Show classes">
      <svg id="mobile-toggle-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 10 8 5 13 10"/>
      </svg>
      <span id="mobile-toggle-label">Hide menu</span>
    </button>
    <button id="btn-mobile-download" class="dl-disabled" aria-label="Download">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="10.5"/>
        <polyline points="4.5 7 8 10.5 11.5 7"/>
        <line x1="2.5" y1="14" x2="13.5" y2="14"/>
      </svg>
    </button>
  </div>

  <div id="diagram-tooltip" role="tooltip">
    <span class="tip-label"></span>
    <span class="tip-sub"></span>
  </div>

  <!-- CLASS DEFINITIONS: colori, label, dipendenze, priorità z-order -->
  <script src="setting_sets/class-definitions.js"></script>

  <!-- SCENARIOS: geometria del diagramma per ogni combinazione di classi -->
  <script src="setting_sets/scenarios.js"></script>

  <!-- CONTENUTI DIDATTICI: un file per classe in complexity_sets/ -->
  <script src="complexity_sets/P/config.js"></script>
  <script src="complexity_sets/NP/config.js"></script>
  <script src="complexity_sets/NP-c/config.js"></script>
  <script src="complexity_sets/NP-h/config.js"></script>
  <script src="complexity_sets/co-NP/config.js"></script>
  <script src="complexity_sets/co-NP-c/config.js"></script>
  <script src="complexity_sets/co-NP-h/config.js"></script>
  <script src="complexity_sets/PSPACE/config.js"></script>
  <script src="complexity_sets/PSPACE-c/config.js"></script>
  <script src="complexity_sets/PSPACE-h/config.js"></script>
  <script src="complexity_sets/NP-intersect-co-NP/config.js"></script>

  <!-- JS (unico file) -->
  <script src="js/main.js"></script>
</body>
</html>
